<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Frontend - Connected to Backend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row-full {
            grid-column: 1 / -1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.9em;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .badge-priority {
            background: #ff6b6b;
            color: white;
        }

        .badge-priority.medium {
            background: #ffa500;
        }

        .badge-priority.low {
            background: #51cf66;
        }

        .badge-category {
            background: #e7f5ff;
            color: #667eea;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-small:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #f93e3e;
        }

        .btn-danger:hover {
            background: #e63946;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease-in-out;
        }

        .notification.success {
            border-left: 4px solid #51cf66;
        }

        .notification.error {
            border-left: 4px solid #f93e3e;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Task Manager</h1>
            <p>Frontend Connected to Backend API</p>
        </div>

        <div class="main-content">
            <!-- Statistics Section -->
            <div class="section">
                <h2>📊 Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Tasks</div>
                        <div class="stat-value" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" id="completedCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="pendingCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Completion Rate</div>
                        <div class="stat-value" id="completionRate">0%</div>
                    </div>
                </div>
            </div>

            <!-- Create Task Section -->
            <div class="section">
                <h2>➕ Create New Task</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskInput">Task Description</label>
                        <input type="text" id="taskInput" placeholder="Enter task description" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categorySelect">Category</label>
                            <select id="categorySelect" required>
                                <option value="">Loading categories...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="prioritySelect">Priority</label>
                            <select id="prioritySelect" required>
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="taskTimer">Time Estimate (minutes)</label>
                        <input type="number" id="taskTimer" placeholder="Optional: set time in minutes" min="0">
                    </div>

                    <button type="submit">➕ Add Task</button>
                </form>
            </div>

            <!-- Filter Section -->
            <div class="section">
                <h2>🔍 Filter & Search</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="filterSelect">Filter by Category</label>
                        <select id="filterSelect">
                            <option value="All">All Categories</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="searchInput">Search Tasks</label>
                        <input type="text" id="searchInput" placeholder="Search by task name...">
                    </div>
                </div>
            </div>

            <!-- Tasks List Section -->
            <div class="section">
                <h2>📝 Your Tasks</h2>
                <div id="taskListContainer">
                    <ul class="task-list" id="taskList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No tasks yet. Create one to get started!</p>
                        </div>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification-container"></div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        // DOM Elements
        const taskForm = document.getElementById("taskForm");
        const taskInput = document.getElementById("taskInput");
        const categorySelect = document.getElementById("categorySelect");
        const prioritySelect = document.getElementById("prioritySelect");
        const filterSelect = document.getElementById("filterSelect");
        const searchInput = document.getElementById("searchInput");
        const taskList = document.getElementById("taskList");
        const notifContainer = document.getElementById("notification-container");
        const totalCount = document.getElementById("totalCount");
        const completedCount = document.getElementById("completedCount");
        const pendingCount = document.getElementById("pendingCount");
        const completionRate = document.getElementById("completionRate");
        const taskTimerInput = document.getElementById("taskTimer");

        let tasks = [];
        let categories = [];
        let selectedCategoryId = null;

        // Initialize
        async function initialize() {
            await loadCategories();
            await loadTasks();
            renderStats();
        }

        // Load Categories
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE_URL}/categories`);
                const data = await response.json();

                if (data.success) {
                    categories = data.data;
                    populateCategoryDropdowns();
                } else {
                    showNotification("Failed to load categories", "error");
                }
            } catch (error) {
                console.error('Error loading categories:', error);
                showNotification("Failed to load categories", "error");
            }
        }

        // Populate Category Dropdowns
        function populateCategoryDropdowns() {
            categorySelect.innerHTML = '';
            filterSelect.innerHTML = '<option value="">All Categories</option>';

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                categorySelect.appendChild(option);

                const filterOption = document.createElement('option');
                filterOption.value = cat.id;
                filterOption.textContent = cat.name;
                filterSelect.appendChild(filterOption);
            });

            if (categories.length > 0) {
                categorySelect.value = categories[0].id;
            }
        }

        // Load Tasks
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE_URL}/tasks`);
                const data = await response.json();

                if (data.success) {
                    tasks = data.data;
                    renderTasks();
                } else {
                    showNotification("Failed to load tasks", "error");
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
                showNotification("Failed to load tasks", "error");
            }
        }

        // Add Task
        async function addTask(event) {
            event.preventDefault();

            const taskText = taskInput.value.trim();
            const categoryId = categorySelect.value;
            const priority = prioritySelect.value;
            const minsValue = taskTimerInput.value;
            const originalTime = minsValue ? parseInt(minsValue, 10) * 60 : 0;

            if (!taskText) {
                showNotification("Task cannot be empty", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: taskText,
                        category_id: categoryId,
                        priority: priority,
                        original_time: originalTime,
                        remaining_time: originalTime
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification("Task added successfully!", "success");
                    taskInput.value = '';
                    taskTimerInput.value = '';
                    await loadTasks();
                    renderStats();
                } else {
                    showNotification(data.message || "Failed to add task", "error");
                }
            } catch (error) {
                console.error('Error adding task:', error);
                showNotification("Error adding task", "error");
            }
        }

        // Toggle Task Completion
        async function toggleTask(taskId) {
            try {
                const response = await fetch(`${API_BASE_URL}/tasks/${taskId}/toggle`, {
                    method: 'PATCH'
                });

                const data = await response.json();

                if (data.success) {
                    showNotification("Task updated!", "success");
                    await loadTasks();
                    renderStats();
                } else {
                    showNotification("Failed to update task", "error");
                }
            } catch (error) {
                console.error('Error toggling task:', error);
                showNotification("Error updating task", "error");
            }
        }

        // Delete Task
        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showNotification("Task deleted!", "success");
                    await loadTasks();
                    renderStats();
                } else {
                    showNotification("Failed to delete task", "error");
                }
            } catch (error) {
                console.error('Error deleting task:', error);
                showNotification("Error deleting task", "error");
            }
        }

        // Render Tasks
        function renderTasks() {
            const filterValue = filterSelect.value;
            const searchValue = searchInput.value.toLowerCase();

            let filtered = tasks.filter(task => {
                const matchesFilter = !filterValue || task.category_id === filterValue;
                const matchesSearch = task.text.toLowerCase().includes(searchValue);
                return matchesFilter && matchesSearch;
            });

            taskList.innerHTML = '';

            if (filtered.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No tasks found. Create one to get started!</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(task => {
                const category = categories.find(c => c.id === task.category_id);
                const categoryName = category ? category.name : 'Unknown';
                const priorityClass = task.priority.toLowerCase();

                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="task-content">
                        <div class="task-text">${task.text}</div>
                        <div class="task-meta">
                            <span class="badge badge-priority ${priorityClass}">${task.priority}</span>
                            <span class="badge badge-category">${categoryName}</span>
                            ${task.original_time > 0 ? `<span class="badge" style="background: #f0f0f0; color: #333;">⏱️ ${Math.floor(task.original_time / 60)}m</span>` : ''}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn-small" onclick="toggleTask('${task.id}')">
                            ${task.completed ? '↩️ Undo' : '✓ Complete'}
                        </button>
                        <button class="btn-small btn-danger" onclick="deleteTask('${task.id}')">🗑️ Delete</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        // Render Statistics
        function renderStats() {
            const completed = tasks.filter(t => t.completed).length;
            const pending = tasks.length - completed;
            const rate = tasks.length > 0 ? ((completed / tasks.length) * 100).toFixed(0) : 0;

            totalCount.textContent = tasks.length;
            completedCount.textContent = completed;
            pendingCount.textContent = pending;
            completionRate.textContent = rate + '%';
        }

        // Show Notification
        function showNotification(message, type = 'success') {
            const notif = document.createElement("div");
            notif.className = `notification ${type}`;
            notif.textContent = message;
            notifContainer.appendChild(notif);

            setTimeout(() => notif.remove(), 3000);
        }

        // Event Listeners
        taskForm.addEventListener('submit', addTask);
        filterSelect.addEventListener('change', renderTasks);
        searchInput.addEventListener('input', renderTasks);

        // Initialize on load
        initialize();
    </script>
</body>
</html>
